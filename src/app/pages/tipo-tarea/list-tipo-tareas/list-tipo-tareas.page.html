<app-header></app-header>

<ion-content class="list-tipo-tareas-content">

  <ion-grid class="search-grid">
    <ion-row class="ion-align-items-center">
      <ion-col>
        <ion-searchbar
          placeholder="Buscar tipo de tarea..."
          [(ngModel)]="searchTerm"
          (ionInput)="filterTiposTarea()"
          animated="true">
        </ion-searchbar>
      </ion-col>
      <ion-col size="auto">
        <ion-button shape="round" (click)="openTipoTareaForm()">
          <ion-icon slot="start" name="add-outline"></ion-icon>
          Nuevo
        </ion-button>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-text color="medium">
          <small>{{ filteredTiposTarea.length }} tipo{{ filteredTiposTarea.length !== 1 ? 's' : '' }} encontrado{{ filteredTiposTarea.length !== 1 ? 's' : '' }}</small>
        </ion-text>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-grid class="cards-grid">
    <ion-row *ngFor="let tipoTarea of filteredTiposTarea">
      <ion-col size="12">
        <ion-card class="item-card">

          <div class="card-header-custom">
            <div class="card-header-left">
              <div class="item-icon-wrap">
                <ion-icon name="clipboard-outline"></ion-icon>
              </div>
              <div class="card-header-info">
                <h2 class="item-titulo">{{ tipoTarea.descripcion }}</h2>
              </div>
            </div>
          </div>

          <ion-card-content>
            <ion-grid class="ion-no-padding acciones-grid">
              <ion-row class="ion-align-items-center">
                <ion-col>
                  <ion-button expand="block" fill="outline" size="small" color="primary" (click)="openTipoTareaForm(tipoTarea)">
                    <ion-icon slot="start" name="create-outline"></ion-icon>
                    Editar
                  </ion-button>
                </ion-col>
                <ion-col size="auto">
                  <ion-button fill="outline" size="small" color="danger" (click)="deleteTipoTarea(tipoTarea.id)">
                    <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
                  </ion-button>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-card-content>

        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="filteredTiposTarea.length === 0">
      <ion-col class="empty-state">
        <ion-icon name="clipboard-outline"></ion-icon>
        <p>Sin tipos de tarea registrados</p>
        <small>Crea un nuevo tipo para comenzar</small>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
