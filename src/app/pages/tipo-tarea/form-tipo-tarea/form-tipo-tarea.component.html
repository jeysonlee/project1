<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ isEdit ? 'Editar Tipo de Tarea' : 'Nuevo Tipo de Tarea' }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">
        <ion-icon slot="icon-only" name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card>
    <ion-card-header>
      <ion-card-title>
        <ion-icon name="receipt-outline"></ion-icon>
        Datos del Tipo de Tarea
      </ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label position="stacked">Descripción</ion-label>
        <ion-input [(ngModel)]="descripcion"></ion-input>
      </ion-item>
    </ion-card-content>
  </ion-card>

  <div class="form-actions">
    <ion-button expand="block" (click)="save()" color="primary">
      <ion-icon slot="start" [name]="isEdit ? 'create-outline' : 'save-outline'"></ion-icon>
      {{ isEdit ? 'Actualizar' : 'Guardar' }}
    </ion-button>
  </div>

</ion-content>
